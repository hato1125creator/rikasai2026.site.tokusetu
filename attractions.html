<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企画一覧 — 梨花祭2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4a843; --gold-light: #f0d080; --gold-pale: #faf0d0;
  --rose: #c9546a; --teal: #2a7a80; --teal-light: #48b0b8;
  --cream: #fdf8f0; --ink: #1a120a; --ink-soft: #3a2818; --parchment: #f5ead8;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--cream); color:var(--ink); font-family:'Noto Serif JP',serif; }

/* ── NAV ── */
.top-nav {
  background:var(--ink); border-bottom:1px solid rgba(212,168,67,0.2);
  padding:0 24px; position:sticky; top:0; z-index:200;
}
.top-nav-inner {
  max-width:1040px; margin:0 auto;
  display:flex; align-items:center; height:52px; gap:0;
}
.back-btn {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.25em;
  color:rgba(240,208,128,0.5); text-decoration:none;
  display:flex; align-items:center; gap:8px; text-transform:uppercase;
  transition:color 0.2s;
}
.back-btn:hover { color:var(--gold-light); }
.back-btn::before { content:'←'; font-family:sans-serif; font-size:13px; }
.nav-sep { width:1px; height:20px; background:rgba(212,168,67,0.15); margin:0 20px; }
.nav-site {
  font-family:'Noto Serif JP',serif; font-size:15px; font-weight:300;
  color:rgba(240,208,128,0.4); letter-spacing:0.1em;
}
.nav-count {
  margin-left:auto;
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.2em;
  color:rgba(240,208,128,0.3); text-transform:uppercase;
}
#visibleCount { color:var(--gold); }

/* ===== NAV ===== */
nav{background:var(--ink);padding:0 24px;position:sticky;top:0;z-index:100;}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;height:52px;gap:24px;flex-wrap:wrap;}
.nav-inner a{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:rgba(240,208,128,.4);text-decoration:none;text-transform:uppercase;transition:color .2s;}
.nav-inner a:hover{color:var(--gold);}

/* ── PAGE HERO ── */
.page-hero {
  background:var(--ink); padding:56px 24px 48px;
  position:relative; overflow:hidden;
  border-bottom:1px solid rgba(212,168,67,0.15);
}
.page-hero::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 15% 60%, rgba(212,168,67,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(72,176,184,0.05) 0%, transparent 50%);
}
.page-hero-inner { max-width:1040px; margin:0 auto; position:relative; }
.page-hero-eyebrow {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.4em;
  color:var(--gold); opacity:0.6; text-transform:uppercase;
  display:block; margin-bottom:14px;
}
.page-hero-title {
  font-family:'Noto Serif JP',serif; font-size:clamp(28px,5vw,42px);
  font-weight:300; color:var(--gold-light); letter-spacing:0.15em;
  margin-bottom:12px;
}
.page-hero-sub {
  font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic;
  color:rgba(240,208,128,0.4); letter-spacing:0.15em;
}

/* ── SEARCH & FILTER BAR ── */
.search-bar {
  background:var(--parchment); padding:24px;
  border-bottom:1px solid rgba(212,168,67,0.15);
  position:sticky; top:52px; z-index:100;
  box-shadow:0 4px 24px rgba(26,18,10,0.06);
}
.search-bar-inner {
  max-width:1040px; margin:0 auto;
  display:flex; flex-direction:column; gap:16px;
}
.search-row {
  display:flex; gap:12px; align-items:center; flex-wrap:wrap;
}
.search-input-wrap {
  flex:1; min-width:200px; position:relative;
}
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:14px; opacity:0.4; pointer-events:none;
}
#searchInput {
  width:100%; padding:11px 14px 11px 40px;
  border:1px solid rgba(212,168,67,0.3); background:var(--cream);
  font-family:'Noto Serif JP',serif; font-size:13px; color:var(--ink);
  outline:none; transition:border-color 0.2s;
}
#searchInput:focus { border-color:var(--gold); }
#searchInput::placeholder { color:rgba(58,40,24,0.35); }
.search-clear {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer;
  font-size:14px; color:rgba(58,40,24,0.3);
  display:none; transition:color 0.2s; padding:2px;
}
.search-clear.show { display:block; }
.search-clear:hover { color:var(--ink); }

/* category filter */
.filter-row {
  display:flex; gap:8px; flex-wrap:wrap; align-items:center;
}
.filter-label {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.25em;
  color:var(--gold); opacity:0.6; text-transform:uppercase;
  margin-right:4px; white-space:nowrap;
}
.filter-btn {
  padding:6px 14px;
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.15em;
  border:1px solid rgba(212,168,67,0.3); background:transparent;
  color:rgba(58,40,24,0.55); cursor:pointer; text-transform:uppercase;
  transition:all 0.2s; white-space:nowrap;
}
.filter-btn:hover { border-color:var(--gold); color:var(--ink-soft); }
.filter-btn.active {
  background:var(--ink); color:var(--gold-light);
  border-color:var(--ink);
}

/* ── GRID ── */
.grid-wrap { max-width:1040px; margin:0 auto; padding:40px 24px 80px; }

.no-results {
  display:none; text-align:center; padding:80px 0;
  font-family:'Cormorant Garamond',serif; font-size:20px;
  font-style:italic; color:rgba(58,40,24,0.3);
}
.no-results.show { display:block; }

.cards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
  gap:20px;
}

/* ── CARD ── */
.card {
  background:var(--parchment); border:1px solid rgba(212,168,67,0.22);
  display:flex; flex-direction:column;
  transition:transform 0.25s, box-shadow 0.25s;
  position:relative; overflow:hidden;
  animation:cardIn 0.4s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.card:hover { transform:translateY(-4px); box-shadow:0 12px 36px rgba(26,18,10,0.1); }
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--gold), var(--teal-light));
}

/* thumb */
.card-thumb {
  width:100%; aspect-ratio:4/3;
  background:var(--ink); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.card-thumb img { width:100%; height:100%; object-fit:cover; }
.card-thumb-placeholder {
  font-size:56px; opacity:0.18;
  position:absolute;
}
.card-thumb-gradient {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(26,18,10,0.5) 0%, transparent 60%);
}
.card-thumb-badge {
  position:absolute; bottom:10px; left:12px;
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.15em;
  color:rgba(240,208,128,0.7); text-transform:uppercase;
  background:rgba(26,18,10,0.5); padding:3px 8px;
}

/* body */
.card-body { padding:20px; flex:1; display:flex; flex-direction:column; }
.card-meta {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:10px;
}
.card-grade {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.2em;
  color:var(--gold); text-transform:uppercase; opacity:0.75;
}
.card-num {
  font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300;
  color:rgba(212,168,67,0.15); line-height:1;
}
.card-title {
  font-size:16px; font-weight:500; color:var(--ink);
  margin-bottom:8px; line-height:1.4;
}
.card-type {
  display:inline-block; font-size:10px;
  border:1px solid; padding:2px 10px; margin-bottom:10px;
}
.card-desc {
  font-size:12px; color:var(--ink-soft); line-height:1.8;
  font-weight:300; opacity:0.7; flex:1;
}
.card-tags {
  display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;
}
.card-tag {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.1em;
  padding:2px 8px; border:1px solid rgba(72,176,184,0.3);
  color:var(--teal-light); opacity:0.7;
}

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(10,8,4,0.88); backdrop-filter:blur(6px);
  z-index:500; display:flex; align-items:center; justify-content:center;
  padding:24px; opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--ink); border:1px solid rgba(212,168,67,0.3);
  max-width:640px; width:100%; max-height:88vh; overflow-y:auto;
  position:relative;
  transform:translateY(20px) scale(0.98);
  transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
}
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-thumb {
  width:100%; aspect-ratio:16/7;
  background:rgba(26,18,10,0.8); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.modal-thumb img { width:100%; height:100%; object-fit:cover; }
.modal-thumb-placeholder { font-size:80px; opacity:0.15; }
.modal-thumb-bar {
  position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--gold), var(--teal-light));
}
.modal-close {
  position:absolute; top:12px; right:12px;
  width:32px; height:32px; background:rgba(26,18,10,0.6);
  border:1px solid rgba(240,208,128,0.2); color:rgba(240,208,128,0.5);
  font-size:15px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
  transition:all 0.2s; z-index:10;
}
.modal-close:hover { background:rgba(240,208,128,0.1); color:var(--gold-light); }
.modal-header {
  padding:28px 32px 20px;
  border-bottom:1px solid rgba(212,168,67,0.1);
}
.modal-grade {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.3em;
  color:var(--gold); text-transform:uppercase; margin-bottom:8px; opacity:0.8;
}
.modal-title {
  font-family:'Noto Serif JP',serif; font-size:24px; font-weight:400;
  color:var(--gold-light); margin-bottom:10px; line-height:1.4;
}
.modal-type {
  display:inline-block; font-size:11px; padding:3px 12px;
  border:1px solid; opacity:0.85;
}
.modal-body { padding:24px 32px 32px; }
.modal-section-label {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.3em;
  color:var(--gold); text-transform:uppercase; opacity:0.6;
  margin:20px 0 10px; display:block;
}
.modal-section-label:first-child { margin-top:0; }
.modal-desc {
  font-size:13px; color:rgba(240,208,128,0.6);
  line-height:2; font-weight:300;
}
.modal-info-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
}
@media(max-width:480px){
  .modal-info-grid { grid-template-columns:1fr; }
  .modal-header,.modal-body { padding-left:20px; padding-right:20px; }
}
.modal-info-item {
  background:rgba(240,208,128,0.04); border:1px solid rgba(240,208,128,0.09);
  padding:10px 14px;
}
.modal-info-key {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.2em;
  color:var(--gold); opacity:0.6; display:block; margin-bottom:4px;
}
.modal-info-val { font-size:13px; color:rgba(240,208,128,0.7); font-weight:300; }
.modal-tag-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
.modal-tag {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.12em;
  padding:3px 10px; border:1px solid rgba(72,176,184,0.3);
  color:var(--teal-light); opacity:0.8;
}
</style>
</head>

<!-- GRID -->

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">

    </div>
  </div>
</div>

// =============================================
// STATE
// =============================================
let currentFilter = 'all';
let currentSearch = '';

// =============================================
// RENDER CARDS
// =============================================
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const q = currentSearch.trim().toLowerCase();
  let visible = 0;

  grid.innerHTML = DATA.map((d, idx) => {
    const catMatch = currentFilter === 'all' || d.type.includes(currentFilter);
    const textMatch = !q
      || d.title.includes(q)
      || d.grade.includes(q)
      || d.desc.toLowerCase().includes(q)
      || d.tags.some(t => t.includes(q));
    if (!catMatch || !textMatch) return '';
    visible++;

    return `
    <div class="card" style="animation-delay:${(visible-1)*0.04}s">
      <div class="card-thumb">
        <div class="card-thumb-placeholder">${d.emoji}</div>
        <div class="card-thumb-gradient"></div>
        <span class="card-thumb-badge">${d.type}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-grade">${d.grade}</span>
          <span class="card-num">${d.num}</span>
        </div>
        <h3 class="card-title">${d.title}</h3>
        <span class="card-type" style="color:${d.typeColor};border-color:${d.typeColor}88">${d.type}</span>
        <p class="card-desc">${d.desc.slice(0,55)}…</p>
        <div class="card-tags">
          ${d.tags.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('')}
        </div>
        <button class="class-card-btn" onclick="openModal('${d.id}')"
          style="margin-top:16px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;
                 color:var(--gold);border:1px solid rgba(212,168,67,0.4);background:transparent;
                 padding:8px 16px;cursor:pointer;text-transform:uppercase;
                 transition:background 0.2s,color 0.2s;display:inline-flex;align-items:center;gap:6px;"
          onmouseover="this.style.background='var(--gold)';this.style.color='var(--ink)'"
          onmouseout="this.style.background='transparent';this.style.color='var(--gold)'">
          詳細はこちら →
        </button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('noResults').classList.toggle('show', visible === 0);
  document.getElementById('visibleCount').textContent = visible;
}

// =============================================
// FILTER / SEARCH
// =============================================
function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.cat;
  renderCards();
}

function onSearch(input) {
  currentSearch = input.value;
  document.getElementById('clearBtn').classList.toggle('show', input.value.length > 0);
  renderCards();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  document.getElementById('clearBtn').classList.remove('show');
  renderCards();
}

// =============================================
// MODAL
// =============================================
const dataMap = Object.fromEntries(DATA.map(d => [d.id, d]));

function openModal(id) {
  const d = dataMap[id];
  if (!d) return;
  document.getElementById('m-emoji').textContent = d.emoji;
  document.getElementById('m-grade').textContent = d.grade;
  document.getElementById('m-title').textContent = d.title;
  const typeEl = document.getElementById('m-type');
  typeEl.textContent = d.type;
  typeEl.style.color = d.typeColor;
  typeEl.style.borderColor = d.typeColor + '88';
  document.getElementById('m-desc').textContent = d.desc;
  document.getElementById('m-info').innerHTML = d.info
    .map(i => `<div class="modal-info-item"><span class="modal-info-key">${i.k}</span><span class="modal-info-val">${i.v}</span></div>`)
    .join('');
  document.getElementById('m-tags').innerHTML = d.tags
    .map(t => `<span class="modal-tag">${t}</span>`)
    .join('');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// =============================================
// INIT
// =============================================
renderCards();
</script>
</body>
</html>
