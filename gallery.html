<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォトギャラリー — 梨花祭2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Noto+Serif+JP:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4a843;--gold-light:#f0d080;--cream:#fdf8f0;--ink:#1a120a;--ink-soft:#3a2818;--parchment:#f5ead8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--ink);font-family:'Noto Serif JP',serif;}
.top-nav{background:var(--ink);border-bottom:1px solid rgba(212,168,67,.2);padding:0 24px;position:sticky;top:0;z-index:100;}
.top-nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;height:52px;}
.back-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.25em;color:rgba(240,208,128,.5);text-decoration:none;display:flex;align-items:center;gap:8px;text-transform:uppercase;transition:color .2s;}
.back-btn:hover{color:var(--gold-light);}
.back-btn::before{content:'←';}
.nav-sep{width:1px;height:20px;background:rgba(212,168,67,.15);margin:0 20px;}
.nav-site{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:300;color:rgba(240,208,128,.4);letter-spacing:.1em;}
.nav-links{margin-left:auto;display:flex;}
.nav-links a{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:rgba(240,208,128,.4);text-decoration:none;padding:0 14px;text-transform:uppercase;transition:color .2s;}
.nav-links a:hover{color:var(--gold);}

/* ===== NAV ===== */
nav{background:var(--ink);padding:0 24px;position:sticky;top:0;z-index:100;}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;height:52px;gap:24px;flex-wrap:wrap;}
.nav-inner a{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:rgba(240,208,128,.4);text-decoration:none;text-transform:uppercase;transition:color .2s;}
.nav-inner a:hover{color:var(--gold);}

.hero{background:var(--ink);padding:60px 24px;position:relative;overflow:hidden;border-bottom:1px solid rgba(212,168,67,.12);}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 60%,rgba(212,168,67,.07) 0%,transparent 55%);}
.hero-inner{max-width:960px;margin:0 auto;position:relative;}
.eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:var(--gold);opacity:.6;text-transform:uppercase;display:block;margin-bottom:14px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,5vw,44px);font-weight:300;font-style:italic;color:var(--gold-light);letter-spacing:.05em;margin-bottom:8px;}
.hero-title-jp{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;color:var(--gold);letter-spacing:.3em;text-transform:uppercase;}
.section{max-width:960px;margin:0 auto;padding:60px 24px;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:40px;}
.filter-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;padding:8px 16px;border:1px solid rgba(212,168,67,.3);background:transparent;color:var(--ink-soft);cursor:pointer;text-transform:uppercase;transition:all .2s;}
.filter-btn.active{background:var(--ink);color:var(--gold-light);border-color:var(--ink);}
.filter-btn:hover{border-color:var(--gold);}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.gallery-item{position:relative;background:var(--parchment);aspect-ratio:1;overflow:hidden;cursor:pointer;transition:transform .3s;border:1px solid rgba(212,168,67,.15);}
.gallery-item:hover{transform:scale(1.05);}
.gallery-thumb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#f5ead8 0%,#e8dcc8 100%);position:relative;}
.gallery-overlay{position:absolute;inset:0;background:rgba(26,18,10,.6);opacity:0;transition:opacity .3s;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;text-align:center;padding:20px;}
.gallery-item:hover .gallery-overlay{opacity:1;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox-content{position:relative;max-width:90vw;max-height:90vh;}
.lightbox-img{width:100%;height:100%;object-fit:contain;display:flex;align-items:center;justify-content:center;font-size:120px;}
.lightbox-close{position:absolute;top:10px;right:10px;width:40px;height:40px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.lightbox-close:hover{background:rgba(0,0,0,.8);}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 20px;}
.lightbox-btn{background:rgba(0,0,0,.3);border:none;color:#fff;font-size:24px;cursor:pointer;padding:10px 15px;transition:background .2s;}
.lightbox-btn:hover{background:rgba(0,0,0,.6);}
footer{background:var(--ink);padding:36px 24px;text-align:center;border-top:1px solid rgba(212,168,67,.1);}
.footer-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:300;color:var(--gold-light);letter-spacing:.2em;margin-bottom:6px;}
.footer-copy{font-size:11px;color:rgba(240,208,128,.18);font-weight:300;}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="about.html">梨花祭とは</a>
    <a href="attractions.html">企画一覧</a>
    <a href="map.html">マップ</a>
    <a href="schedule.html">プログラム</a>
    <a onclick="scrollToSection('notice')">お知らせ</a>
    <a onclick="scrollToSection('award')">梨花祭賞</a>
    <a href="gallery.html">ギャラリー</a>
    <a href="rules.html">ご注意</a>
    <a href="ticket.html">料金</a>
    <a href="sns.html">SNS</a>
    <a onclick="scrollToSection('access')">アクセス</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <span class="eyebrow">Photo Gallery</span>
    <h1 class="hero-title">Photo Gallery</h1>
    <p class="hero-title-jp">フォトギャラリー</p>
  </div>
</section>

<section class="section">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterGallery('all')">すべて</button>
    <button class="filter-btn" onclick="filterGallery('2025')">2025年の様子</button>
    <button class="filter-btn" onclick="filterGallery('stage')">ステージ</button>
    <button class="filter-btn" onclick="filterGallery('booths')">出し物</button>
    <button class="filter-btn" onclick="filterGallery('crowd')">来場者</button>
  </div>

  <div class="gallery-grid" id="gallery">
    <!-- Items will be generated by JS -->
  </div>
</section>

<div class="lightbox" id="lightbox">
  <div class="lightbox-content">
    <div class="lightbox-img" id="lightboxImg"></div>
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-nav">
      <button class="lightbox-btn" onclick="prevLightbox()">‹</button>
      <button class="lightbox-btn" onclick="nextLightbox()">›</button>
    </div>
  </div>
</div>

<footer>
  <p class="footer-logo">梨花祭 2026</p>
  <p class="footer-copy">© 2026 梨花祭実行委員会</p>
</footer>

<script>
const GALLERY = [
  {emoji:'🎭',cat:'stage',title:'ステージパフォーマンス'},
  {emoji:'🎪',cat:'booths',title:'出し物ブース'},
  {emoji:'👥',cat:'crowd',title:'来場者との交流'},
  {emoji:'🎨',cat:'booths',title:'展示企画'},
  {emoji:'🎉',cat:'2025',title:'2025年の梨花祭'},
  {emoji:'🍽️',cat:'booths',title:'飲食企画'},
  {emoji:'🎸',cat:'stage',title:'軽音ライブ'},
  {emoji:'📸',cat:'2025',title:'昨年のフォトスポット'},
  {emoji:'💃',cat:'stage',title:'ダンスパフォーマンス'},
  {emoji:'🎪',cat:'booths',title:'体験コーナー'},
  {emoji:'🌟',cat:'crowd',title:'笑顔いっぱい'},
  {emoji:'🏆',cat:'2025',title:'梨花祭賞授賞式'},
];

let currentFilter='all';
let currentIdx=0;

function renderGallery(){
  const filtered = currentFilter==='all' ? GALLERY : GALLERY.filter(g=>g.cat===currentFilter);
  const html = filtered.map((g,i)=>`
    <div class="gallery-item" onclick="openLightbox(${i})">
      <div class="gallery-thumb">${g.emoji}</div>
      <div class="gallery-overlay">${g.title}</div>
    </div>`).join('');
  document.getElementById('gallery').innerHTML=html;
}

function filterGallery(cat){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  currentIdx=0;
  renderGallery();
}

function openLightbox(i){
  currentIdx=i;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

function updateLightbox(){
  const filtered = currentFilter==='all' ? GALLERY : GALLERY.filter(g=>g.cat===currentFilter);
  const item = filtered[currentIdx];
  document.getElementById('lightboxImg').textContent=item.emoji;
}

function nextLightbox(){
  const filtered = currentFilter==='all' ? GALLERY : GALLERY.filter(g=>g.cat===currentFilter);
  currentIdx = (currentIdx+1)%filtered.length;
  updateLightbox();
}

function prevLightbox(){
  const filtered = currentFilter==='all' ? GALLERY : GALLERY.filter(g=>g.cat===currentFilter);
  currentIdx = (currentIdx-1+filtered.length)%filtered.length;
  updateLightbox();
}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowRight') nextLightbox();
  if(e.key==='ArrowLeft') prevLightbox();
});

renderGallery();
</script>
</body>
</html>
